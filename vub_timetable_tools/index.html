<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <p style="background-color: #f7ca18; color: #000000;">本工具即將停止支援，新版程式將會提供更強大的功能，敬請期待。 <a href="https://www.github.com/d1fficult222/very_useful_bot">瞭解更多</a></p>
    <h2>編輯和匯出課表</h2>
    <p>本工具適用於 VeryUsefulBot 1.9.0 ~ 1.9.1</p>
    <p>使用說明：</p>
    <img src="instructions.png" style="border: #f7ca18 2px solid; ">
    <div class="input-row">
        <p>輸入課程資訊</p>
        <div>
            <input type="text" id="courseName" placeholder="名稱">
            <input type="text" id="courseLocation" placeholder="地點 (非必填)">
            <input type="text" id="courseInstructor" placeholder="指導者 (非必填)">
        </div>
        <button onclick="addCourse()">填入選取的格子</button>
        <button onclick="clearSelected()" class="dangerButton">清空選取的格子</button>
        <button  onclick="exportToJson()">匯出為 JSON</button>
    </div>
    <table class="timetable" id="timetable">
        <thead>
            <tr>
                <th> 一節課時長：<select id="interval">
                    <option>30</option>
                    <option>35</option>
                    <option>40</option>
                    <option>45</option>
                    <option selected>50</option>
                    <option>55</option>
                    <option>60</option>
                    <option>65</option>
                    <option>70</option>
                </select> 分鐘</th>
                <th>MON</th>
                <th>TUE</th>
                <th>WED</th>
                <th>THU</th>
                <th>FRI</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="t1"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t2"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t3"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t4"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t5"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t6"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t7"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t8"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t9"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t10"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t11"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t12"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td id="t13"></td><td></td><td></td><td></td><td></td><td></td>
            </tr>
        </tbody>
    </table>
    <script src="script.js"></script>
</body>
